services:
    # Nginx Web Server - Reverse Proxy
    nginx:
        image: nginx:latest
        ports: 
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
            - ./backend:/var/www/html
        depends_on:
            - backend
        networks:
            - socialite-network
        command: sh -c "nginx && tail -f /var/log/nginx/error.log"

    # CakePHP 5.0 Backend - PHP-FPM Application Server
    backend:
        build:
            context: ./
            dockerfile: ./php/Dockerfile
        container_name: socialite-backend
        volumes:
            - ./backend:/var/www/html
            - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        environment:
            - DB_HOST=db
            - DB_PORT=3306
            - DB_NAME=socialite
            - DB_USER=user
            - DB_PASSWORD=admin123
            - DEBUG=1
        command: sh -c "composer install --no-dev || true && touch /var/www/html/logs/error.log && php-fpm -D && tail -f /var/www/html/logs/error.log"
        depends_on:
            - db
        networks:
            - socialite-network
        working_dir: /var/www/html

    # MySQL 8.0 Database
    db:
        image: mysql:8.0
        container_name: socialite-db
        volumes:
            - db_data:/var/lib/mysql
            - ./db/init-db.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - "3306:3306"
        restart: unless-stopped
        environment:  
            MYSQL_ROOT_PASSWORD: admin123
            MYSQL_DATABASE: socialite
            MYSQL_USER: user
            MYSQL_PASSWORD: admin123
        networks:
            - socialite-network

volumes:
    db_data:

networks:
    socialite-network:
        driver: bridge