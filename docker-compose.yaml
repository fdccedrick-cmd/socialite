services:
    # Nginx Web Server - Reverse Proxy
    nginx:
        image: nginx:latest
        ports: 
            - "8080:80"
            - "8443:443"
        volumes:
            - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
            - ./backend:/var/www/html
        depends_on:
            - backend
        networks:
            - socialite-network
        command: sh -c "nginx && tail -f /var/log/nginx/error.log"

    # CakePHP 5.0 Backend - PHP-FPM Application Server
    backend:
        build:
            context: ./
            dockerfile: ./php/Dockerfile
        container_name: socialite-backend
        volumes:
            - ./backend:/var/www/html
            - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        env_file:
            - .env
        command: sh -c "touch /var/www/html/logs/error.log && php-fpm -D && tail -f /var/www/html/logs/error.log"
        depends_on:
            - db
        networks:
            - socialite-network
        working_dir: /var/www/html

    # WebSocket Server - Real-time Communication
    websocket:
        build:
            context: ./
            dockerfile: ./php/Dockerfile
        container_name: socialite-websocket
        volumes:
            - ./backend:/var/www/html
            - ./php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        ports:
            - "8081:8081"
        env_file:
            - .env
        command: sh -c "touch /var/www/html/logs/websocket.log && php /var/www/html/bin/websocket-server.php 2>&1 | tee -a /var/www/html/logs/websocket.log"
        depends_on:
            - db
            - backend
        networks:
            - socialite-network
        working_dir: /var/www/html
        restart: unless-stopped

    # MySQL 8.0 Database
    db:
        image: mysql:8.0
        container_name: socialite-db
        volumes:
            - db_data:/var/lib/mysql
            - ./db/init-db.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - "3308:3306"
        restart: unless-stopped
        env_file:
            - .env
        environment:  
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        networks:
            - socialite-network

volumes:
    db_data:

networks:
    socialite-network:
        driver: bridge